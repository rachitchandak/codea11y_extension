<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeA11y - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-body);
        }
    </style>
</head>

<body>
    <div class="center-container">
        <div class="logo">
            <h1>CodeA11y</h1>
            <p>Recover your password</p>
        </div>

        <!-- Step 1: Request Email -->
        <div id="step1">
            <div id="errorMsg1" class="msg-box msg-error"></div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" required placeholder="john@example.com">
            </div>

            <button onclick="fetchQuestion()" class="btn-primary">Continue</button>
        </div>

        <!-- Step 2: Answer Question & Reset -->
        <div id="step2" style="display: none;">
            <div id="msgBox2" class="msg-box"></div>

            <div class="form-group">
                <label class="form-label">Security Question</label>
                <div id="questionText" class="static-value" style="color: var(--text-primary); font-weight: 500;"></div>
            </div>

            <div class="form-group">
                <label for="answer" class="form-label">Your Answer</label>
                <input type="text" id="answer" class="form-input" required placeholder="Answer">
            </div>

            <div class="form-group">
                <label for="newPass" class="form-label">New Password</label>
                <input type="password" id="newPass" class="form-input" required
                    placeholder="8-12 chars, upper, lower, digit, special">
            </div>

            <button onclick="resetPassword()" class="btn-primary">Reset Password</button>
            <button onclick="requestAdminReset()" class="btn-neutral"
                style="margin-top: 0.75rem; width: 100%; color: var(--text-secondary);">I forgot my answer (Request
                Admin)</button>
        </div>

        <div class="links">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script>
        let userEmail = '';

        async function fetchQuestion() {
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg1');

            if (!email) {
                errorMsg.textContent = 'Please enter your email';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`api/auth/security-question/${encodeURIComponent(email)}`);
                const data = await res.json();

                if (res.ok && data.security_question) {
                    userEmail = email;
                    document.getElementById('questionText').textContent = data.security_question;
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    errorMsg.textContent = 'User not found or no security question set.';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = 'Error: ' + e.message;
                errorMsg.style.display = 'block';
            }
        }

        async function resetPassword() {
            const answer = document.getElementById('answer').value;
            const newPassword = document.getElementById('newPass').value;
            const errorMsg = document.getElementById('msgBox2'); // Use errorMsg locally

            errorMsg.className = 'msg-box';
            errorMsg.style.display = 'none';

            if (!answer || !newPassword) {
                errorMsg.textContent = 'Please fill all fields';
                errorMsg.classList.add('msg-error');
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('api/auth/reset-password-question', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, security_answer: answer, new_password: newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    errorMsg.textContent = 'Password reset successfully! Redirecting...';
                    errorMsg.classList.add('msg-success');
                    errorMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    errorMsg.textContent = data.error || 'Reset failed';
                    errorMsg.classList.add('msg-error');
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = 'Error: ' + e.message;
                errorMsg.classList.add('msg-error');
                errorMsg.style.display = 'block';
            }
        }

        async function requestAdminReset() {
            const errorMsg = document.getElementById('msgBox2');

            try {
                const res = await fetch('api/auth/request-password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });

                const data = await res.json();

                if (res.ok) {
                    errorMsg.textContent = 'Reset request sent to admin. You will be notified when approved.';
                    errorMsg.classList.add('msg-success');
                    errorMsg.style.display = 'block';
                } else {
                    errorMsg.textContent = data.error || 'Request failed';
                    errorMsg.classList.add('msg-error');
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = 'Error: ' + e.message;
                errorMsg.classList.add('msg-error');
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>

</html>
