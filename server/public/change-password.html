<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeA11y - Update Password</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-body);
        }
    </style>
</head>

<body>
    <div class="center-container">
        <div class="logo">
            <h1>Update Password</h1>
            <p>Security update required for your account.</p>
        </div>

        <div id="msgBox" class="msg-box"></div>

        <form id="changeForm">
            <div class="form-group" id="oldPasswordGroup">
                <label for="oldPassword" class="form-label">Old Password</label>
                <input type="password" id="oldPassword" class="form-input" required
                    placeholder="Enter your current password" autocomplete="current-password">
            </div>

            <div class="form-group">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" id="newPassword" class="form-input" required
                    placeholder="8-12 chars, upper, lower, digit, special" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <input type="password" id="confirmPassword" class="form-input" required placeholder="Re-enter password" autocomplete="new-password">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 0.5rem;">Update Password</button>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        const isForced = localStorage.getItem('require_password_change') === 'true';
        if (isForced) {
            const oldPasswordGroup = document.getElementById('oldPasswordGroup');
            const oldPasswordInput = document.getElementById('oldPassword');
            if (oldPasswordGroup && oldPasswordInput) {
                oldPasswordGroup.style.display = 'none';
                oldPasswordInput.removeAttribute('required');
            }
        }

        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('msgBox'); 

            errorMsg.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = "Passwords don't match!";
                errorMsg.className = 'msg-box msg-error';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                // Determine if this is a forced change based on URL params or localStorage
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                const isForced = localStorage.getItem('require_password_change') === 'true';

                const res = await fetch('api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword,
                        is_forced: isForced
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    errorMsg.textContent = 'Password updated! Redirecting...';
                    errorMsg.className = 'msg-box msg-success';
                    errorMsg.style.display = 'block';

                    setTimeout(() => {
                        const user = JSON.parse(localStorage.getItem('user') || '{}');
                        if (user.is_admin) {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'user.html';
                        }
                    }, 1500);
                } else {
                    errorMsg.textContent = data.error || 'Update failed';
                    errorMsg.className = 'msg-box msg-error';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error: ' + err.message;
                errorMsg.className = 'msg-box msg-error';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
