<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeA11y - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-body);
        }
    </style>
</head>

<body>
    <div class="center-container">
        <div class="logo">
            <h1>CodeA11y</h1>
            <p>Login to your account to continue</p>
        </div>

        <form id="loginForm">
            <div id="errorMsg" class="msg-box msg-error"></div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 0.5rem;">Sign In</button>
        </form>

        <div class="links">
            <a href="forgot-password.html">Forgot password?</a>
            <span style="color: var(--border-color); margin: 0 0.5rem;">|</span>
            <a href="register.html">Create an account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('redirect_vscode') === '1') {
                        // Redirect back into the IDE (vscode, cursor, vscode-insiders, etc.)
                        const VALID_SCHEMES = ['vscode', 'vscode-insiders', 'cursor', 'antigravity', 'vscodium', 'windsurf'];
                        const rawScheme = (params.get('scheme') || 'vscode').toLowerCase();
                        const scheme = VALID_SCHEMES.includes(rawScheme) ? rawScheme : 'vscode';
                        const cbUrl = `${scheme}://wcag-analyzer/auth-callback?token=${encodeURIComponent(data.token)}&email=${encodeURIComponent(data.user.email)}`;
                        window.location.href = cbUrl;
                        return;
                    }

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('require_password_change', data.require_password_change); // Store require_password_change

                    if (data.require_password_change) {
                        window.location.href = 'change-password.html';
                    } else if (data.user.is_admin) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'user.html';
                    }
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.className = 'msg-box msg-error'; // Set class for styling
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error: ' + err.message;
                errorMsg.className = 'msg-box msg-error'; // Set class for styling
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
