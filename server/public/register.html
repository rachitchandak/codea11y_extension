<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeA11y - Register</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            background: var(--bg-body);
            min-height: 100vh;
        }
    </style>
</head>

<body>
    <div class="center-container">
        <div class="logo">
            <h1>CodeA11y</h1>
            <p>Create a new account</p>
        </div>

        <form id="registerForm">
            <div id="msgBox" class="msg-box"></div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required
                    placeholder="8-12 chars, upper, lower, digit, special" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-input" required placeholder="Re-enter password" autocomplete="new-password">
            </div>

            <div style="border-top: 1px solid var(--border-color); margin: 1.5rem 0;"></div>

            <div class="form-group">
                <label for="securityQuestion" class="form-label">Security Question</label>
                <select id="securityQuestion" class="form-input" required style="cursor: pointer;">
                    <option value="" disabled selected>Select a question...</option>
                    <option value="What was your first pet's name?">What was your first pet's name?</option>
                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is the name of your favorite book?">What is the name of your favorite book?
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="securityAnswer" class="form-label">Security Answer</label>
                <input type="text" id="securityAnswer" class="form-input" required placeholder="Your answer">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 0.5rem;">Register</button>
        </form>

        <div class="links">
            <a href="login.html">Already have an account? Sign in</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const securityQuestion = document.getElementById('securityQuestion').value;
            const securityAnswer = document.getElementById('securityAnswer').value;
            const errorMsg = document.getElementById('msgBox'); // Keep ID msgBox but use errorMsg var

            // Reset msg
            errorMsg.style.display = 'none';
            errorMsg.className = 'msg-box';

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords don't match!";
                errorMsg.classList.add('msg-error');
                errorMsg.style.display = 'block';
                return;
            }

            if (!securityQuestion || !securityAnswer) {
                errorMsg.textContent = "Please set a security question/answer.";
                errorMsg.classList.add('msg-error');
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, security_question: securityQuestion, security_answer: securityAnswer })
                });

                const data = await res.json();

                if (res.ok) {
                    errorMsg.textContent = 'Account created! Redirecting to login...';
                    errorMsg.classList.add('msg-success');
                    errorMsg.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    errorMsg.textContent = data.error || 'Registration failed';
                    errorMsg.classList.add('msg-error');
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error: ' + err.message;
                errorMsg.classList.add('msg-error');
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
